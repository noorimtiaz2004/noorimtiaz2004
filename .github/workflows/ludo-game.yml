name: Ludo Game
on:
  issues:
    types: [opened]
jobs:
  play:
    if: "startsWith(github.event.issue.title, 'Ludo:')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Parse title
        id: parse
        run: |
          TITLE="${{ github.event.issue.title }}"
          TOKEN=$(echo "$TITLE" | sed 's/Ludo: Move //' | sed 's/Ludo: Pass /pass_/')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          echo "author=${{ github.event.issue.user.login }}" >> $GITHUB_OUTPUT
      - name: Run game
        run: python3 .github/scripts/ludo.py "${{ steps.parse.outputs.token }}" "${{ steps.parse.outputs.author }}"
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md board.svg .github/ludo_state.json
          git commit -m "Ludo: ${{ steps.parse.outputs.author }} played ${{ steps.parse.outputs.token }}"
          git push
      - name: Close issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Done! Thanks @${{ steps.parse.outputs.author }}! 🎲"
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed"
            });
